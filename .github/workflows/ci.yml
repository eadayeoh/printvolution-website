name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new commit lands, so
# a rapid-fire push doesn't queue up N stale builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Next.js production build
        # Build needs the Supabase URL at import time (metadataBase +
        # server-only imports). The anon key is safe in build logs —
        # it's the same key the browser sees.
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

  rls-regression:
    name: RLS regression
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Probe anon reads + writes against Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/rls-regression.mjs

  security-audit:
    name: npm audit (critical-only gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Visible advisory report for high + critical — prints to the log
      # so the PR author can see what Dependabot will open PRs for.
      - name: Audit report (high + critical, non-blocking)
        run: npm audit --audit-level=high || true
      # Hard gate: only critical advisories block the build. High
      # advisories still get fixed — Dependabot opens PRs for them —
      # but they don't wedge every unrelated feature PR while the team
      # schedules the upgrade. A known-DoS Next 14 advisory (GHSA-q4gf,
      # ...) needs Next 16 which is breaking, so we track that as a
      # dedicated upgrade PR, not a gating blocker.
      - name: Block on critical advisories
        run: npm audit --audit-level=critical
